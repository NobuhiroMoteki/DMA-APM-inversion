<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1350 308" width="1350" height="308"
     font-family="Arial, Helvetica, sans-serif">

  <rect width="1350" height="308" fill="#ffffff"/>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7.5" refY="4" orient="auto">
      <path d="M0,0.5 L0,7.5 L8.5,4 z" fill="#4b5563"/>
    </marker>
  </defs>

  <!-- ============================================================
       ROW 1: INSTRUMENT / SAMPLE FLOW   (boxes y=50–140, centre y=95)
       ============================================================ -->

  <!-- Polydisperse aerosol: varied-size dots -->
  <circle cx="32"  cy="60"  r="7"   fill="#93c5fd" opacity="0.85"/>
  <circle cx="52"  cy="53"  r="3.5" fill="#3b82f6" opacity="0.85"/>
  <circle cx="70"  cy="59"  r="9.5" fill="#bfdbfe" opacity="0.85"/>
  <circle cx="40"  cy="77"  r="5"   fill="#60a5fa" opacity="0.85"/>
  <circle cx="64"  cy="82"  r="3"   fill="#3b82f6" opacity="0.85"/>
  <circle cx="83"  cy="69"  r="6.5" fill="#93c5fd" opacity="0.85"/>
  <circle cx="48"  cy="96"  r="8.5" fill="#bfdbfe" opacity="0.85"/>
  <circle cx="76"  cy="94"  r="4"   fill="#60a5fa" opacity="0.85"/>
  <circle cx="27"  cy="92"  r="3"   fill="#3b82f6" opacity="0.85"/>
  <circle cx="90"  cy="82"  r="5.5" fill="#93c5fd" opacity="0.85"/>
  <circle cx="62"  cy="108" r="3.5" fill="#60a5fa" opacity="0.85"/>
  <circle cx="36"  cy="108" r="6"   fill="#bfdbfe" opacity="0.85"/>
  <text x="58" y="128" text-anchor="middle" font-size="11" fill="#6b7280">Polydisperse</text>
  <text x="58" y="141" text-anchor="middle" font-size="11" fill="#6b7280">aerosol</text>

  <!-- Arrow 1: aerosol → DMA -->
  <line x1="108" y1="95" x2="145" y2="95" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- DMA box -->
  <rect x="148" y="50" width="148" height="90" rx="7" fill="#f9fafb" stroke="#555" stroke-width="1.8"/>
  <text x="222" y="82"  text-anchor="middle" font-size="18" font-weight="bold" fill="#1f2937">DMA</text>
  <text x="222" y="100" text-anchor="middle" font-size="12" fill="#6b7280">Classifies by electrical</text>
  <text x="222" y="115" text-anchor="middle" font-size="12" fill="#6b7280">mobility; selects D<tspan dy="3" font-size="9">mob</tspan></text>

  <!-- Arrow 2: DMA → DMA outlet zone -->
  <line x1="298" y1="95" x2="337" y2="95" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- DMA outlet zone (dashed): dots centred, positions slightly randomised -->
  <rect x="340" y="50" width="175" height="90" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="7,4"/>
  <!-- Row 1 of dots (nominal y=66, randomised ±0.5–2 px) -->
  <circle cx="382" cy="64" r="5" fill="#3b82f6" opacity="0.8"/>
  <circle cx="404" cy="67" r="5" fill="#3b82f6" opacity="0.8"/>
  <circle cx="428" cy="65" r="5" fill="#3b82f6" opacity="0.8"/>
  <circle cx="448" cy="68" r="5" fill="#3b82f6" opacity="0.8"/>
  <circle cx="475" cy="65" r="5" fill="#3b82f6" opacity="0.8"/>
  <!-- Row 2 of dots (nominal y=83, randomised ±0.5–2 px) -->
  <circle cx="392" cy="84" r="5" fill="#3b82f6" opacity="0.8"/>
  <circle cx="419" cy="82" r="5" fill="#3b82f6" opacity="0.8"/>
  <circle cx="440" cy="85" r="5" fill="#3b82f6" opacity="0.8"/>
  <circle cx="466" cy="81" r="5" fill="#3b82f6" opacity="0.8"/>
  <!-- labels: moved down to avoid dot overlap (dot bottom ≈ y=90) -->
  <text x="427" y="108" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1d4ed8">f(m) = dN/dm</text>
  <text x="427" y="122" text-anchor="middle" font-size="11.5" fill="#3b82f6">[target of inversion]</text>

  <!-- Arrow 3: DMA outlet zone → APM -->
  <line x1="517" y1="95" x2="554" y2="95" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- APM box -->
  <rect x="557" y="50" width="158" height="90" rx="7" fill="#f9fafb" stroke="#555" stroke-width="1.8"/>
  <text x="636" y="82"  text-anchor="middle" font-size="18" font-weight="bold" fill="#1f2937">APM</text>
  <text x="636" y="100" text-anchor="middle" font-size="12" fill="#6b7280">Scans voltage V; classifies</text>
  <text x="636" y="115" text-anchor="middle" font-size="12" fill="#6b7280">particles by mass m</text>

  <!-- Arrow 4: APM → CPC -->
  <line x1="717" y1="95" x2="756" y2="95" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- CPC box -->
  <rect x="759" y="50" width="158" height="90" rx="7" fill="#f9fafb" stroke="#555" stroke-width="1.8"/>
  <text x="838" y="82"  text-anchor="middle" font-size="18" font-weight="bold" fill="#1f2937">CPC</text>
  <text x="838" y="100" text-anchor="middle" font-size="12" fill="#6b7280">Counts particles;</text>
  <text x="838" y="115" text-anchor="middle" font-size="12" fill="#6b7280">records n(V) [cm&#x207B;&#xB3;]</text>

  <!-- ============================================================
       CROSS-ROW ARROW: CPC → n(V)  dashed, label "raw data"
       ============================================================ -->
  <line x1="838" y1="141" x2="838" y2="199" stroke="#4b5563" stroke-width="2"
        stroke-dasharray="6,4" marker-end="url(#arr)"/>
  <text x="848" y="174" font-size="11" fill="#6b7280" font-style="italic">raw data</text>

  <!-- ============================================================
       ROW 2 SECTION HEADER: "★ This Tool" centred above Inversion box
       ============================================================ -->
  <text x="632" y="197" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#15803d">
    ★  This Tool
  </text>

  <!-- ============================================================
       ROW 2: DATA ANALYSIS
       All boxes: y=202–300 (height=98), centre y=251
       n(V) [right]  ←  Inversion  ←  f(m) [left]
       ============================================================ -->

  <!-- ── n(V) box ── -->
  <rect x="760" y="202" width="157" height="98" rx="7" fill="#f9fafb" stroke="#555" stroke-width="1.8"/>
  <text x="838" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2937">n(V)</text>
  <line x1="774" y1="285" x2="907" y2="285" stroke="#9ca3af" stroke-width="1"/>
  <line x1="774" y1="285" x2="774" y2="226" stroke="#9ca3af" stroke-width="1"/>
  <!-- histogram bars (10 bars, bell-shaped, bottom at y=285) -->
  <rect x="776" y="280" width="11" height="5"  fill="#3b82f6" opacity="0.75"/>
  <rect x="790" y="273" width="11" height="12" fill="#3b82f6" opacity="0.75"/>
  <rect x="804" y="261" width="11" height="24" fill="#3b82f6" opacity="0.75"/>
  <rect x="818" y="247" width="11" height="38" fill="#3b82f6" opacity="0.75"/>
  <rect x="832" y="238" width="11" height="47" fill="#3b82f6" opacity="0.75"/>
  <rect x="846" y="235" width="11" height="50" fill="#3b82f6" opacity="0.75"/>
  <rect x="860" y="243" width="11" height="42" fill="#3b82f6" opacity="0.75"/>
  <rect x="874" y="257" width="11" height="28" fill="#3b82f6" opacity="0.75"/>
  <rect x="888" y="270" width="11" height="15" fill="#3b82f6" opacity="0.75"/>
  <rect x="902" y="279" width="11" height="6"  fill="#3b82f6" opacity="0.75"/>
  <text x="905" y="295" font-size="11" fill="#6b7280" font-style="italic" text-anchor="end">V</text>
  <text x="778" y="232" font-size="11" fill="#6b7280" font-style="italic">n</text>

  <!-- Arrow: n(V) → Inversion (left) -->
  <line x1="758" y1="251" x2="733" y2="251" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ── Inversion box ── -->
  <rect x="535" y="202" width="195" height="98" rx="7" fill="#f9fafb" stroke="#555" stroke-width="1.8"/>
  <text x="632" y="245" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2937">Inversion</text>
  <text x="632" y="265" text-anchor="middle" font-size="12" fill="#6b7280" font-style="italic">n(V) = &#x222B; K(V, m) f(m) dm</text>

  <!-- Arrow: Inversion → f(m) (left) -->
  <line x1="533" y1="251" x2="503" y2="251" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ── f(m) box ── -->
  <rect x="340" y="202" width="160" height="98" rx="7" fill="#f9fafb" stroke="#555" stroke-width="1.8"/>
  <text x="420" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2937">f(m) = dN/dm</text>
  <line x1="355" y1="288" x2="492" y2="288" stroke="#9ca3af" stroke-width="1"/>
  <line x1="355" y1="288" x2="355" y2="226" stroke="#9ca3af" stroke-width="1"/>
  <!-- bumpy bell curve -->
  <path d="
    M 358 287
    C 364 287, 368 283, 373 278
    C 378 274, 381 270, 388 266
    C 394 262, 397 260, 401 258
    C 405 256, 406 254, 410 256
    C 414 257, 418 251, 429 245
    C 437 239, 441 238, 446 239
    C 451 241, 455 247, 462 255
    C 468 262, 472 270, 480 277
    C 487 283, 491 286, 493 287
  " fill="none" stroke="#3b82f6" stroke-width="2.2"/>
  <text x="490" y="297" font-size="11" fill="#6b7280" font-style="italic" text-anchor="end">m</text>
  <text x="359" y="232" font-size="11" fill="#6b7280" font-style="italic">f</text>

</svg>
